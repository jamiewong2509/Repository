<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIMOTHY's BIRTHDAY TURNER 🎂</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

  :root {
    --pink:   #FF6EB4;
    --yellow: #FFE033;
    --mint:   #3DFFB0;
    --orange: #FF8C42;
    --purple: #B06DFF;
    --bg:     #FFF5F9;
    --dark:   #2D1B4E;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .dot {
    position: absolute; border-radius: 50%; opacity: 0.55;
    animation: floatUp linear infinite;
  }
  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg);   opacity: 0.6; }
    100% { transform: translateY(-10vh) rotate(720deg); opacity: 0;   }
  }

  header {
    text-align: center; margin-bottom: 10px; position: relative; z-index: 1;
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.5rem, 5vw, 2.6rem);
    color: var(--dark); letter-spacing: 1px; line-height: 1.1;
  }
  header h1 span { color: var(--pink); }
  header p { font-size: .95rem; color: #a07ab8; font-weight: 700; margin-top: 4px; }

  .wheel-section {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
  }

  .pointer {
    width: 0; height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 36px solid var(--dark);
    filter: drop-shadow(0 4px 6px rgba(0,0,0,.3));
    margin-bottom: -2px; position: relative; z-index: 3;
  }

  canvas {
    border-radius: 50%;
    box-shadow: 0 8px 40px rgba(176,109,255,.35), 0 0 0 6px #fff, 0 0 0 10px var(--purple);
    display: block;
  }

  .spin-btn {
    margin-top: 24px;
    font-family: 'Fredoka One', cursive; font-size: 1.7rem; letter-spacing: 2px;
    padding: 14px 56px; border: none; border-radius: 60px;
    background: linear-gradient(135deg, var(--pink), var(--orange));
    color: #fff; cursor: pointer;
    box-shadow: 0 6px 20px rgba(255,110,180,.5);
    transition: transform .12s, box-shadow .12s;
    position: relative; z-index: 1; user-select: none;
  }
  .spin-btn:hover:not(:disabled) { transform: scale(1.06); box-shadow: 0 10px 28px rgba(255,110,180,.6); }
  .spin-btn:active:not(:disabled) { transform: scale(.97); }
  .spin-btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }

  .rounds-left { margin-top: 12px; font-weight: 900; font-size: .95rem; color: var(--purple); position: relative; z-index: 1; }

  /* Modal */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(45,27,78,.55); backdrop-filter: blur(4px);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.show { display: flex; }

  .modal {
    background: #fff; border-radius: 28px; padding: 40px 36px 32px;
    max-width: 380px; width: 90%; text-align: center;
    box-shadow: 0 20px 60px rgba(176,109,255,.4);
    animation: popIn .35s cubic-bezier(.34,1.56,.64,1) both; position: relative;
  }
  @keyframes popIn {
    from { transform: scale(.5); opacity: 0; }
    to   { transform: scale(1);  opacity: 1; }
  }

  .modal .hbd { font-family: 'Fredoka One', cursive; font-size: 1.7rem; color: var(--pink); margin-bottom: 6px; }
  .modal .round-text { font-size: .85rem; color: #a07ab8; font-weight: 700; margin-bottom: 14px; }
  .modal .prize-emoji { font-size: 3.2rem; margin-bottom: 8px; }
  .modal .prize-name { font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: var(--dark); line-height: 1.3; }
  .modal .congrats { margin-top: 12px; font-size: .95rem; color: #777; font-weight: 700; }

  /* Special style for 多謝參與 modal */
  .modal.thankyou .hbd { color: #aaa; font-size: 1.3rem; }
  .modal.thankyou .prize-name { color: #888; font-size: 1.6rem; }

  .modal-btn {
    margin-top: 22px; font-family: 'Fredoka One', cursive; font-size: 1.2rem;
    padding: 12px 40px; border: none; border-radius: 50px;
    background: linear-gradient(135deg, var(--mint), #00c97a);
    color: var(--dark); cursor: pointer; box-shadow: 0 4px 16px rgba(61,255,176,.4);
    transition: transform .1s;
  }
  .modal-btn:hover { transform: scale(1.05); }

  .modal .burst {
    position: absolute; top: -24px; left: 50%; transform: translateX(-50%);
    font-size: 3rem; animation: spin3 1.5s linear infinite;
  }
  @keyframes spin3 {
    from { transform: translateX(-50%) rotate(0deg); }
    to   { transform: translateX(-50%) rotate(360deg); }
  }

  .done-banner {
    display: none; font-family: 'Fredoka One', cursive; font-size: 1.3rem;
    color: var(--pink); margin-top: 16px; text-align: center;
    position: relative; z-index: 1; animation: bounce .6s ease infinite alternate;
  }
  @keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-6px); }
  }
</style>
</head>
<body>

<div class="confetti-container" id="confettiContainer"></div>

<header>
  <h1>🎂 <span>TIMOTHY's</span> BIRTHDAY TURNER 🎂</h1>
  <p>Spin to reveal your surprise! 🎁✨</p>
</header>

<div class="wheel-section">
  <div class="pointer"></div>
  <canvas id="wheel" width="340" height="340"></canvas>
  <button class="spin-btn" id="spinBtn" onclick="spinWheel()">🎉 SPIN 🎉</button>
  <div class="rounds-left" id="roundsLeft"></div>
  <div class="done-banner" id="doneBanner">🎊 All surprises revealed! Happy Birthday Timothy! 🎂🎊</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox">
    <div class="burst" id="modalBurst">🌟</div>
    <div class="hbd" id="modalTitle">🎂 HAPPY BIRTHDAY! 🎂</div>
    <div class="round-text" id="modalRound"></div>
    <div class="prize-emoji" id="modalEmoji"></div>
    <div class="prize-name" id="modalPrize"></div>
    <div class="congrats" id="modalCongrats">YOU GOT THIS IN THIS ROUND!</div>
    <button class="modal-btn" onclick="closeModal()">Woohoo! 🥳</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────────────────
// PRIZE DEFINITIONS
// The SEQUENCE array defines exactly what pops up on each spin (1→7).
// The wheel always shows ALL remaining segments; we just control which one
// the pointer lands on by computing the exact stop angle.
// ─────────────────────────────────────────────────────────────────────────────

const THANKYOU = { label: "多謝參與", name: "多謝參與", emoji: "🙏", color: "#A8D8A8", isThankyou: true };
const S1       = { label: "Surprise",  name: "森美同款飲料一盒",     emoji: "🥤", color: "#FF6EB4" };
const S2       = { label: "Surprise",  name: "BEYOND 蔥油雞一客",    emoji: "🍗", color: "#FFB830" };
const S3       = { label: "Surprise",  name: "SERVICING 林家謙一個", emoji: "🎤", color: "#B06DFF" };

// 5 total spins: 多謝, S1, S2, 多謝, S3
const SPIN_SEQUENCE = [
  { ...THANKYOU },
  { ...S1 },
  { ...S2 },
  { ...THANKYOU },
  { ...S3 },
];

// Wheel segments start = full pool, removed one-by-one after each spin
// We need each segment to have a stable identity so we can target it by index.
// Assign unique ids.
let wheelSegments = SPIN_SEQUENCE.map((p, i) => ({ ...p, uid: i }));

let spinCount    = 0;   // how many spins done
let spinning     = false;
let currentAngle = 0;   // accumulated wheel rotation (radians), canvas coords

const canvas     = document.getElementById('wheel');
const ctx        = canvas.getContext('2d');
const spinBtn    = document.getElementById('spinBtn');
const roundsEl   = document.getElementById('roundsLeft');
const doneBanner = document.getElementById('doneBanner');

// ── Draw ──────────────────────────────────────────────────────────────────────
// Pointer is at the TOP of the canvas (angle = -π/2 in standard math).
// Segment i occupies angles: [currentAngle + i*slice, currentAngle + (i+1)*slice]
// The segment UNDER the pointer is whichever segment contains angle -π/2.

function drawWheel(angle) {
  const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 6;
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const n = wheelSegments.length;
  if (n === 0) return;
  const slice = (2 * Math.PI) / n;

  wheelSegments.forEach((seg, i) => {
    const start = angle + i * slice;
    const end   = start + slice;
    const mid   = start + slice / 2;

    // Slice
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = seg.color;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    ctx.stroke();

    // Emoji
    const ex = cx + Math.cos(mid) * r * 0.58;
    const ey = cy + Math.sin(mid) * r * 0.58;
    ctx.font = n <= 2 ? '44px serif' : n <= 4 ? '30px serif' : '22px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(seg.emoji, ex, ey);

    // Label — rotated along spoke
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(mid);
    ctx.textAlign = 'right';
    const fs = n <= 3 ? 14 : n <= 5 ? 12 : 10;
    ctx.font = `bold ${fs}px Nunito`;
    ctx.fillStyle = '#fff';
    ctx.shadowColor = 'rgba(0,0,0,.5)';
    ctx.shadowBlur = 3;
    ctx.fillText(seg.label, r * 0.92, 0);
    ctx.restore();
  });

  // Centre circle
  ctx.beginPath();
  ctx.arc(cx, cy, 28, 0, 2 * Math.PI);
  ctx.fillStyle = '#fff';
  ctx.fill();
  ctx.strokeStyle = '#e0d0f0';
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.font = '20px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowBlur = 0;
  ctx.fillText('🎂', cx, cy);
}

// ── Which segment is under the pointer at a given angle? ──────────────────────
// Pointer is at canvas top = math angle -π/2.
// Segment i spans [angle + i*slice, angle + (i+1)*slice].
// We find i such that -π/2 falls in that range (mod 2π).
function segmentUnderPointer(angle) {
  const n = wheelSegments.length;
  const slice = (2 * Math.PI) / n;
  const POINTER = -Math.PI / 2;
  // Normalise pointer relative to current angle
  let rel = ((POINTER - angle) % (2 * Math.PI) + 2 * Math.PI) % (2 * Math.PI);
  return Math.floor(rel / slice) % n;
}

// ── Spin ──────────────────────────────────────────────────────────────────────
function spinWheel() {
  if (spinning || spinCount >= SPIN_SEQUENCE.length) return;
  spinning = true;
  spinBtn.disabled = true;

  const targetPrize = SPIN_SEQUENCE[spinCount]; // what MUST win this spin
  // Find this prize in current wheelSegments by uid
  const targetUid = spinCount; // uid === original index in SPIN_SEQUENCE
  const targetIdx = wheelSegments.findIndex(s => s.uid === targetUid);

  const n     = wheelSegments.length;
  const slice = (2 * Math.PI) / n;
  const POINTER = -Math.PI / 2;

  // We want segment targetIdx to be centred under the pointer.
  // Centre of segment targetIdx (in world coords) = currentAngle + targetIdx*slice + slice/2
  // We need that centre to equal POINTER + k*2π for some integer k.
  // So we need to ADD a delta to currentAngle such that:
  //   (currentAngle + delta) + targetIdx*slice + slice/2 = POINTER + k*2π
  //   delta = POINTER - slice/2 - targetIdx*slice - currentAngle  (+k*2π to make delta > 0)
  let delta = POINTER - (currentAngle + targetIdx * slice + slice / 2);
  delta = ((delta % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI); // ensure positive
  if (delta < 0.1) delta += 2 * Math.PI; // avoid trivially small rotation

  const extraSpins = (5 + Math.floor(Math.random() * 4)) * 2 * Math.PI;
  const totalRotation = extraSpins + delta;

  const duration  = 3800;
  const startTime = performance.now();
  const startAngle = currentAngle;

  function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

  function frame(now) {
    const t = Math.min((now - startTime) / duration, 1);
    currentAngle = startAngle + totalRotation * easeOut(t);
    drawWheel(currentAngle);

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      // Snap exactly so pointer is dead-centre on target segment
      currentAngle = startAngle + totalRotation;
      drawWheel(currentAngle);
      spinning = false;

      // Show modal for the prize that was targeted
      showModal(targetPrize, spinCount + 1);

      // Remove the winning segment from the wheel
      wheelSegments = wheelSegments.filter(s => s.uid !== targetUid);
      spinCount++;
      updateUI();
    }
  }

  requestAnimationFrame(frame);
}

function updateUI() {
  const remaining = SPIN_SEQUENCE.length - spinCount;
  if (remaining === 0) {
    roundsEl.textContent = '';
    doneBanner.style.display = 'block';
    spinBtn.disabled = true;
  } else {
    roundsEl.textContent = `${remaining} spin${remaining > 1 ? 's' : ''} remaining!`;
    if (!spinning) spinBtn.disabled = false;
  }
  // Redraw after segment removed
  drawWheel(currentAngle);
}

// ── Modal ─────────────────────────────────────────────────────────────────────
function showModal(prize, round) {
  const box = document.getElementById('modalBox');
  const totalSpins = SPIN_SEQUENCE.length;

  if (prize.isThankyou) {
    box.className = 'modal thankyou';
    document.getElementById('modalBurst').textContent = '🙏';
    document.getElementById('modalTitle').textContent = '多謝參與！';
    document.getElementById('modalRound').textContent = `Round ${round} of ${totalSpins}`;
    document.getElementById('modalEmoji').textContent = '🙏';
    document.getElementById('modalPrize').textContent = '多謝參與';
    document.getElementById('modalCongrats').textContent = 'Better luck next time! 🍀';
  } else {
    box.className = 'modal';
    document.getElementById('modalBurst').textContent = '🌟';
    document.getElementById('modalTitle').textContent = '🎂 HAPPY BIRTHDAY! 🎂';
    document.getElementById('modalRound').textContent = `Round ${round} of ${totalSpins}`;
    document.getElementById('modalEmoji').textContent = prize.emoji;
    document.getElementById('modalPrize').textContent = prize.name;
    document.getElementById('modalCongrats').textContent = 'YOU GOT THIS IN THIS ROUND!';
  }

  document.getElementById('modalOverlay').classList.add('show');
  if (!prize.isThankyou) launchBurst();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

// ── Floating confetti ─────────────────────────────────────────────────────────
const container = document.getElementById('confettiContainer');
const colors = ['#FF6EB4','#FFE033','#3DFFB0','#FF8C42','#B06DFF','#FF5C5C'];
for (let i = 0; i < 28; i++) {
  const d = document.createElement('div');
  d.className = 'dot';
  const sz = [8,10,14,18,22][Math.floor(Math.random()*5)];
  d.style.cssText = `width:${sz}px;height:${sz}px;background:${colors[Math.floor(Math.random()*colors.length)]};left:${Math.random()*100}%;animation-duration:${4+Math.random()*7}s;animation-delay:${Math.random()*6}s;`;
  container.appendChild(d);
}

function launchBurst() {
  for (let i = 0; i < 20; i++) {
    const p = document.createElement('div');
    const angle = Math.random() * 2 * Math.PI;
    const dist  = 80 + Math.random() * 180;
    const keyName = `burst_${Date.now()}_${i}`;
    p.style.cssText = `position:fixed;left:50%;top:50%;width:${6+Math.random()*10}px;height:${6+Math.random()*10}px;border-radius:50%;background:${colors[Math.floor(Math.random()*colors.length)]};pointer-events:none;z-index:200;animation:${keyName} 1.2s ease-out forwards;`;
    const style = document.createElement('style');
    style.textContent = `@keyframes ${keyName}{from{transform:translate(-50%,-50%) scale(1);opacity:1}to{transform:translate(calc(-50% + ${Math.cos(angle)*dist}px),calc(-50% + ${Math.sin(angle)*dist}px)) scale(0);opacity:0}}`;
    document.head.appendChild(style);
    document.body.appendChild(p);
    setTimeout(() => { p.remove(); style.remove(); }, 1300);
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
drawWheel(currentAngle);
updateUI();
</script>
</body>
</html>
