<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIMOTHY's BIRTHDAY TURNER 🎂</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap');

  :root {
    --pink:    #FF6EB4;
    --yellow:  #FFE033;
    --mint:    #3DFFB0;
    --orange:  #FF8C42;
    --purple:  #B06DFF;
    --bg:      #FFF5F9;
    --dark:    #2D1B4E;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Floating confetti */
  .confetti-container {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
  }
  .dot {
    position: absolute;
    border-radius: 50%;
    opacity: 0.55;
    animation: floatUp linear infinite;
  }

  @keyframes floatUp {
    0%   { transform: translateY(110vh) rotate(0deg); opacity: 0.6; }
    100% { transform: translateY(-10vh)  rotate(720deg); opacity: 0; }
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 10px;
    position: relative; z-index: 1;
  }
  header h1 {
    font-family: 'Fredoka One', cursive;
    font-size: clamp(1.5rem, 5vw, 2.6rem);
    color: var(--dark);
    letter-spacing: 1px;
    line-height: 1.1;
  }
  header h1 span { color: var(--pink); }
  header p {
    font-size: .95rem; color: #a07ab8; font-weight: 700; margin-top: 4px;
  }

  /* Wheel wrapper */
  .wheel-section {
    position: relative; z-index: 1;
    display: flex; flex-direction: column; align-items: center;
  }

  /* Pointer */
  .pointer {
    width: 0; height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 36px solid var(--dark);
    filter: drop-shadow(0 4px 6px rgba(0,0,0,.3));
    margin-bottom: -2px;
    position: relative; z-index: 3;
  }

  canvas {
    border-radius: 50%;
    box-shadow: 0 8px 40px rgba(176,109,255,.35), 0 0 0 6px #fff, 0 0 0 10px var(--purple);
    display: block;
  }

  /* SPIN button */
  .spin-btn {
    margin-top: 24px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.7rem;
    letter-spacing: 2px;
    padding: 14px 56px;
    border: none;
    border-radius: 60px;
    background: linear-gradient(135deg, var(--pink), var(--orange));
    color: #fff;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(255,110,180,.5);
    transition: transform .12s, box-shadow .12s;
    position: relative; z-index: 1;
    user-select: none;
  }
  .spin-btn:hover:not(:disabled) {
    transform: scale(1.06);
    box-shadow: 0 10px 28px rgba(255,110,180,.6);
  }
  .spin-btn:active:not(:disabled) { transform: scale(.97); }
  .spin-btn:disabled {
    background: #ccc; box-shadow: none; cursor: not-allowed;
  }

  .rounds-left {
    margin-top: 12px;
    font-weight: 900; font-size: .95rem; color: var(--purple);
    position: relative; z-index: 1;
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(45,27,78,.55);
    backdrop-filter: blur(4px);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }

  .modal {
    background: #fff;
    border-radius: 28px;
    padding: 40px 36px 32px;
    max-width: 380px;
    width: 90%;
    text-align: center;
    box-shadow: 0 20px 60px rgba(176,109,255,.4);
    animation: popIn .35s cubic-bezier(.34,1.56,.64,1) both;
    position: relative;
  }
  @keyframes popIn {
    from { transform: scale(.5); opacity: 0; }
    to   { transform: scale(1);  opacity: 1; }
  }

  .modal .hbd {
    font-family: 'Fredoka One', cursive;
    font-size: 1.7rem;
    color: var(--pink);
    margin-bottom: 6px;
  }
  .modal .round-text {
    font-size: .85rem; color: #a07ab8; font-weight: 700; margin-bottom: 14px;
  }
  .modal .prize-emoji { font-size: 3.2rem; margin-bottom: 8px; }
  .modal .prize-name {
    font-family: 'Fredoka One', cursive;
    font-size: 1.4rem;
    color: var(--dark);
    line-height: 1.3;
  }
  .modal .congrats {
    margin-top: 12px;
    font-size: .95rem; color: #777; font-weight: 700;
  }
  .modal-btn {
    margin-top: 22px;
    font-family: 'Fredoka One', cursive;
    font-size: 1.2rem;
    padding: 12px 40px;
    border: none;
    border-radius: 50px;
    background: linear-gradient(135deg, var(--mint), #00c97a);
    color: var(--dark);
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(61,255,176,.4);
    transition: transform .1s;
  }
  .modal-btn:hover { transform: scale(1.05); }

  .modal .burst {
    position: absolute;
    top: -24px; left: 50%; transform: translateX(-50%);
    font-size: 3rem;
    animation: spin3 1.5s linear infinite;
  }
  @keyframes spin3 {
    from { transform: translateX(-50%) rotate(0deg); }
    to   { transform: translateX(-50%) rotate(360deg); }
  }

  /* All-done state */
  .done-banner {
    display: none;
    font-family: 'Fredoka One', cursive;
    font-size: 1.3rem;
    color: var(--pink);
    margin-top: 16px;
    text-align: center;
    position: relative; z-index: 1;
    animation: bounce .6s ease infinite alternate;
  }
  @keyframes bounce {
    from { transform: translateY(0); }
    to   { transform: translateY(-6px); }
  }
</style>
</head>
<body>

<div class="confetti-container" id="confettiContainer"></div>

<header>
  <h1>🎂 <span>TIMOTHY's</span> BIRTHDAY TURNER 🎂</h1>
  <p>Spin to reveal your surprise! 🎁✨</p>
</header>

<div class="wheel-section">
  <div class="pointer"></div>
  <canvas id="wheel" width="340" height="340"></canvas>
  <button class="spin-btn" id="spinBtn" onclick="spinWheel()">🎉 SPIN 🎉</button>
  <div class="rounds-left" id="roundsLeft">3 surprises remaining!</div>
  <div class="done-banner" id="doneBanner">🎊 All surprises revealed! Happy Birthday Timothy! 🎊</div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="burst">🌟</div>
    <div class="hbd">🎂 HAPPY BIRTHDAY! 🎂</div>
    <div class="round-text" id="modalRound"></div>
    <div class="prize-emoji" id="modalEmoji"></div>
    <div class="prize-name" id="modalPrize"></div>
    <div class="congrats">YOU GOT THIS IN THIS ROUND!</div>
    <button class="modal-btn" onclick="closeModal()">Woohoo! 🥳</button>
  </div>
</div>

<script>
  // ── Prizes (fixed order) ──────────────────────────────────────────────
  const ALL_PRIZES = [
    { label: "Surprise 1", name: "森美同款飲料一盒",    emoji: "🥤", color: "#FF6EB4" },
    { label: "Surprise 2", name: "BEYOND 蔥油雞一客",   emoji: "🍗", color: "#FFB830" },
    { label: "Surprise 3", name: "SERVICING 林家謙一個", emoji: "🎤", color: "#B06DFF" },
  ];

  // Queue: we pop from the front each spin
  let remaining = [...ALL_PRIZES];
  let spinIndex  = 0;   // which prize comes next
  let spinning   = false;
  let currentAngle = 0; // tracks wheel rotation in radians

  const canvas   = document.getElementById('wheel');
  const ctx      = canvas.getContext('2d');
  const spinBtn  = document.getElementById('spinBtn');
  const roundsEl = document.getElementById('roundsLeft');
  const doneBanner = document.getElementById('doneBanner');

  // ── Draw wheel ────────────────────────────────────────────────────────
  function drawWheel(angle) {
    const cx = canvas.width / 2, cy = canvas.height / 2, r = cx - 6;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const n = remaining.length;
    const slice = (2 * Math.PI) / n;

    remaining.forEach((prize, i) => {
      const start = angle + i * slice;
      const end   = start + slice;

      // Slice fill
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.arc(cx, cy, r, start, end);
      ctx.closePath();
      ctx.fillStyle = prize.color;
      ctx.fill();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 3;
      ctx.stroke();

      // Emoji
      const mid = start + slice / 2;
      const ex  = cx + Math.cos(mid) * r * 0.58;
      const ey  = cy + Math.sin(mid) * r * 0.58;
      ctx.font = n === 1 ? '52px serif' : '36px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(prize.emoji, ex, ey);

      // Label
      ctx.save();
      ctx.translate(cx, cy);
      ctx.rotate(mid);
      ctx.textAlign = 'right';
      ctx.font = `bold ${n === 1 ? 20 : 15}px Nunito`;
      ctx.fillStyle = '#fff';
      ctx.shadowColor = 'rgba(0,0,0,.4)';
      ctx.shadowBlur = 4;
      ctx.fillText(prize.label, r * 0.93, 0);
      ctx.restore();
    });

    // Centre circle
    ctx.beginPath();
    ctx.arc(cx, cy, 28, 0, 2 * Math.PI);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.strokeStyle = '#e0d0f0';
    ctx.lineWidth = 3;
    ctx.stroke();
    ctx.font = '20px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🎂', cx, cy);
  }

  drawWheel(currentAngle);

  // ── Spin logic ────────────────────────────────────────────────────────
  function spinWheel() {
    if (spinning || remaining.length === 0) return;
    spinning = true;
    spinBtn.disabled = true;

    const n = remaining.length;
    const slice = (2 * Math.PI) / n;

    // Target: pointer at top = -π/2.  The next prize (index 0 after we sort)
    // should land under the pointer. Rotate so segment 0 centres at -π/2.
    // Current start of segment 0 = currentAngle. Centre of segment 0 = currentAngle + slice/2.
    // We want: currentAngle + slice/2 + extraRotation ≡ -π/2  (mod 2π)
    // extraRotation = -π/2 - (currentAngle + slice/2)   (+ multiple of 2π so it's > 0)
    const targetAngle = -Math.PI / 2 - (currentAngle + slice / 2);
    const spins = 5 + Math.random() * 3; // 5–8 full rotations
    const totalRotation = spins * 2 * Math.PI + ((targetAngle % (2 * Math.PI)) + 2 * Math.PI) % (2 * Math.PI);

    const duration = 3500;
    const startTime = performance.now();
    const startAngle = currentAngle;

    function ease(t) {
      // cubic ease-out
      return 1 - Math.pow(1 - t, 3);
    }

    function frame(now) {
      const elapsed = now - startTime;
      const t = Math.min(elapsed / duration, 1);
      currentAngle = startAngle + totalRotation * ease(t);
      drawWheel(currentAngle);

      if (t < 1) {
        requestAnimationFrame(frame);
      } else {
        spinning = false;
        // Show result
        const won = remaining[0];
        showModal(won, spinIndex + 1);
        spinIndex++;
        remaining.shift();
        updateUI();
      }
    }

    requestAnimationFrame(frame);
  }

  function updateUI() {
    const n = remaining.length;
    if (n === 0) {
      roundsEl.textContent = '🎉 All surprises revealed!';
      doneBanner.style.display = 'block';
      spinBtn.disabled = true;
    } else {
      roundsEl.textContent = `${n} surprise${n > 1 ? 's' : ''} remaining!`;
    }
    // Redraw with removed slice
    drawWheel(currentAngle);
    if (remaining.length > 0) spinBtn.disabled = false;
  }

  // ── Modal ─────────────────────────────────────────────────────────────
  function showModal(prize, round) {
    document.getElementById('modalRound').textContent  = `Round ${round} of 3`;
    document.getElementById('modalEmoji').textContent  = prize.emoji;
    document.getElementById('modalPrize').textContent  = prize.name;
    document.getElementById('modalOverlay').classList.add('show');
    launchBurst();
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('show');
  }

  // ── Floating confetti ─────────────────────────────────────────────────
  const container = document.getElementById('confettiContainer');
  const colors = ['#FF6EB4','#FFE033','#3DFFB0','#FF8C42','#B06DFF','#FF5C5C'];
  const sizes  = [8, 10, 14, 18, 22];

  for (let i = 0; i < 28; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    const sz = sizes[Math.floor(Math.random() * sizes.length)];
    d.style.cssText = `
      width:${sz}px; height:${sz}px;
      background:${colors[Math.floor(Math.random() * colors.length)]};
      left:${Math.random() * 100}%;
      animation-duration:${4 + Math.random() * 7}s;
      animation-delay:${Math.random() * 6}s;
    `;
    container.appendChild(d);
  }

  // ── Modal burst confetti ──────────────────────────────────────────────
  function launchBurst() {
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.style.cssText = `
        position:fixed;
        left:50%; top:50%;
        width:${6 + Math.random() * 10}px;
        height:${6 + Math.random() * 10}px;
        border-radius:50%;
        background:${colors[Math.floor(Math.random() * colors.length)]};
        pointer-events:none;
        z-index:200;
        animation: burst${i} 1.2s ease-out forwards;
      `;
      const angle = Math.random() * 2 * Math.PI;
      const dist  = 80 + Math.random() * 180;
      const style = document.createElement('style');
      style.textContent = `@keyframes burst${i} {
        from { transform: translate(-50%,-50%) scale(1); opacity:1; }
        to   { transform: translate(calc(-50% + ${Math.cos(angle)*dist}px), calc(-50% + ${Math.sin(angle)*dist}px)) scale(0); opacity:0; }
      }`;
      document.head.appendChild(style);
      document.body.appendChild(p);
      setTimeout(() => { p.remove(); style.remove(); }, 1300);
    }
  }
</script>
</body>
</html>
